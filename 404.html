<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF7F2" />
  <meta name="robots" content="noindex, follow" />
  <title>404 — Victor Lab</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #FAF7F2;
      color: #0F172A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(180, 83, 9, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180, 83, 9, 0.045) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 720px;
      height: 720px;
      bottom: -240px;
      right: -200px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.10) 0%, rgba(245, 158, 11, 0) 65%);
      pointer-events: none;
      z-index: 0;
    }

    .site-header {
      padding: 20px 24px;
      position: relative;
      z-index: 1;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s ease;
    }
    .brand:hover { opacity: 0.75; }
    .brand img { width: 24px; height: 24px; display: block; }
    .brand span { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 96px;
      position: relative;
      z-index: 1;
    }

    .wrap {
      text-align: center;
      max-width: 540px;
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 2vw, 18px);
      font-weight: 800;
      font-size: clamp(60px, 12vw, 100px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 32px;
    }
    .hero .brace {
      color: #CBD5E1;
      font-weight: 300;
      font-size: 0.9em;
      transform: translateY(-0.03em);
    }
    .hero .num {
      background: linear-gradient(135deg, #F59E0B 0%, #B45309 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.04em;
    }

    .eyebrow {
      font-size: 12px;
      color: #94A3B8;
      letter-spacing: 0.18em;
      font-weight: 600;
      margin-bottom: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    h1 {
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    p.lead {
      font-size: 15px;
      color: #475569;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .path-hint {
      display: none;
      align-items: center;
      gap: 8px;
      justify-content: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px;
      color: #64748B;
      background: rgba(15, 23, 42, 0.04);
      border: 1px solid rgba(15, 23, 42, 0.08);
      padding: 8px 14px;
      border-radius: 8px;
      margin: 0 auto 32px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .path-hint.visible { display: inline-flex; }
    .path-hint .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F59E0B;
      flex-shrink: 0;
    }
    .path-hint code {
      font-family: inherit;
      color: #334155;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.15s ease, border-color 0.15s ease;
    }
    a.primary {
      background: linear-gradient(135deg, #F59E0B 0%, #B45309 100%);
      color: #fff;
      box-shadow: 0 2px 10px rgba(180, 83, 9, 0.22);
    }
    a.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(180, 83, 9, 0.32);
    }
    a.secondary {
      background: #FFFFFF;
      color: #334155;
      border: 1px solid rgba(15, 23, 42, 0.10);
      font-weight: 500;
    }
    a.secondary:hover {
      border-color: rgba(15, 23, 42, 0.18);
      background: #FFFFFF;
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .site-header { padding: 16px 20px; }
      .main { padding: 16px 20px 72px; }
      .hero { margin-bottom: 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand" aria-label="Victor Lab 홈으로">
      <img src="/favicon.svg" alt="" />
      <span>Victor Lab</span>
    </a>
  </header>

  <main class="main">
    <div class="wrap">
      <div class="hero" aria-hidden="true">
        <span class="brace">{</span>
        <span class="num">404</span>
        <span class="brace">}</span>
      </div>

      <div class="eyebrow">PAGE NOT FOUND</div>
      <h1>찾으시는 페이지가 없어요</h1>
      <p class="lead">주소를 잘못 입력하셨거나,<br />해당 페이지가 더 이상 존재하지 않습니다.</p>

      <div class="path-hint" id="pathHint">
        <span class="dot" aria-hidden="true"></span>
        <code id="pathText"></code>
      </div>

      <div class="actions">
        <a href="/" class="btn primary">메인 페이지로 →</a>
        <a href="/#contact" class="btn secondary">문의하기</a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var path = window.location.pathname || '';
      if (path && path !== '/' && path !== '/404.html') {
        var display = path.length > 56 ? path.slice(0, 53) + '...' : path;
        document.getElementById('pathText').textContent = display;
        document.getElementById('pathHint').classList.add('visible');
      }
    })();
  </script>
</body>
</html>
