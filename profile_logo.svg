<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="amber2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="400" height="400" rx="80"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#F59E0B" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Amber glow blob bottom right -->
  <ellipse cx="340" cy="340" rx="160" ry="160" fill="url(#amber2)" clip-path="url(#rounded)"/>

  <!-- V mark - main badge -->
  <rect x="120" y="90" width="160" height="160" rx="32" fill="url(#amber)" filter="url(#glow)"/>

  <!-- V letter -->
  <text x="200" y="218"
    text-anchor="middle"
    fill="#1a1a2e"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="118"
    font-weight="900"
    letter-spacing="-4">V</text>

  <!-- Small accent dot -->
  <circle cx="200" cy="272" r="5" fill="#F59E0B" opacity="0.7" filter="url(#softglow)"/>

  <!-- Victor Lab wordmark -->
  <text x="200" y="316"
    text-anchor="middle"
    fill="#F59E0B"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="6">VICTOR</text>

  <text x="200" y="348"
    text-anchor="middle"
    fill="#ffffff"
    fill-opacity="0.45"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="400"
    letter-spacing="10">LAB</text>
</svg>
